<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5d9 0%, #ffe8b3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #6b5b3c;
            margin-bottom: 15px;
            font-size: 2em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 일러스트 기본 */
        .illustration {
            width: 100px;
            height: 120px;
            position: relative;
            margin: 15px auto 20px;
        }

        /* 공통 얼굴 구조 */
        .char-head {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #f4a692;
            border-radius: 50%;
            left: 10px;
            top: 10px;
        }

        .char-hair {
            position: absolute;
            width: 80px;
            height: 45px;
            background: #2c1810;
            border-radius: 50% 50% 0 0;
            left: 10px;
            top: 10px;
        }

        .char-ear {
            position: absolute;
            width: 18px;
            height: 22px;
            background: #f4a692;
            border-radius: 50%;
            top: 30px;
        }

        .char-ear-left { left: 2px; }
        .char-ear-right { right: 2px; }

        /* 표정 - 행운 (큰 웃음) */
        .illustration.lucky .char-eye {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 38px;
        }
        .illustration.lucky .char-eye-left { left: 32px; }
        .illustration.lucky .char-eye-right { right: 32px; }

        .illustration.lucky .char-eye::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: -2px;
            left: -3px;
            opacity: 0.3;
        }

        .illustration.lucky .char-mouth {
            position: absolute;
            width: 24px;
            height: 16px;
            border: 2px solid #d94970;
            border-top: none;
            border-radius: 0 0 24px 24px;
            left: 50%;
            top: 52px;
            transform: translateX(-50%);
        }

        /* 표정 - 평온 (눈 감음) */
        .illustration.peaceful .char-eye {
            width: 2px;
            height: 10px;
            background: #333;
            position: absolute;
            top: 35px;
            border-radius: 50%;
        }
        .illustration.peaceful .char-eye-left { left: 32px; }
        .illustration.peaceful .char-eye-right { right: 32px; }

        .illustration.peaceful .char-mouth {
            position: absolute;
            width: 20px;
            height: 10px;
            border: 2px solid #d94970;
            border-top: none;
            border-radius: 0 0 20px 20px;
            left: 50%;
            top: 54px;
            transform: translateX(-50%);
        }

        /* 표정 - 중립/깜짝 (O 입) */
        .illustration.neutral .char-eye {
            width: 7px;
            height: 9px;
            background: #333;
            position: absolute;
            top: 35px;
            border-radius: 50%;
        }
        .illustration.neutral .char-eye-left { left: 32px; }
        .illustration.neutral .char-eye-right { right: 32px; }

        .illustration.neutral .char-mouth {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #d94970;
            border-radius: 50%;
            left: 50%;
            top: 50px;
            transform: translateX(-50%);
        }

        /* 표정 - 화남 */
        .illustration.angry .char-eye {
            width: 6px;
            height: 6px;
            background: #333;
            position: absolute;
            top: 36px;
            border-radius: 50%;
        }
        .illustration.angry .char-eye-left { left: 32px; }
        .illustration.angry .char-eye-right { right: 32px; }

        .illustration.angry .char-eye::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 2px;
            background: #333;
            top: -3px;
            left: -2px;
            transform: rotate(-20deg);
        }

        .illustration.angry .char-mouth {
            position: absolute;
            width: 16px;
            height: 8px;
            border: 2px solid #d94970;
            border-radius: 0 0 16px 16px;
            left: 50%;
            top: 54px;
            transform: translateX(-50%);
        }

        /* 포즈 - 축하 (별, 팔) */
        .illustration.celebrating::before,
        .illustration.celebrating::after {
            content: '⭐';
            position: absolute;
            font-size: 16px;
            top: 15px;
        }
        .illustration.celebrating::before { left: -5px; }
        .illustration.celebrating::after { right: -5px; }

        .char-arm {
            position: absolute;
            width: 14px;
            height: 50px;
            background: #f4a692;
            border-radius: 10px;
            top: 70px;
        }
        .char-arm-left {
            left: 0;
            transform: rotate(-35deg);
            transform-origin: bottom center;
        }
        .char-arm-right {
            right: 0;
            transform: rotate(35deg);
            transform-origin: bottom center;
        }

        .illustration.celebrating .char-arm {
            transform: rotate(-50deg);
            transform-origin: bottom center;
            top: 60px;
        }
        .illustration.celebrating .char-arm-right {
            transform: rotate(50deg);
            transform-origin: bottom center;
        }

        /* 포즈 - 팔 올림 (승리) */
        .illustration.victorious .char-arm {
            width: 16px;
            height: 50px;
            top: 50px;
            transform: rotate(-60deg);
            transform-origin: bottom center;
        }
        .illustration.victorious .char-arm-right {
            transform: rotate(60deg);
            transform-origin: bottom center;
        }

        .mascot {
            width: 120px;
            height: 140px;
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* 마누키네코 일러스트 */
        .maneki-neko {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 몸 */
        .neko-body {
            position: absolute;
            width: 70px;
            height: 80px;
            background: white;
            border: 3px solid #333;
            border-radius: 15px 15px 8px 8px;
            left: 25px;
            top: 30px;
            box-shadow: inset 0 0 0 2px #fff;
        }

        /* 머리 */
        .neko-head {
            position: absolute;
            width: 60px;
            height: 65px;
            background: white;
            border: 3px solid #333;
            border-radius: 50%;
            left: 30px;
            top: 0;
        }

        /* 귀 */
        .neko-ear {
            position: absolute;
            width: 14px;
            height: 20px;
            background: white;
            border: 2px solid #333;
            border-radius: 50% 50% 0 0;
            top: -5px;
        }

        .neko-ear-left {
            left: 15px;
        }

        .neko-ear-right {
            right: 15px;
        }

        /* 귀 안쪽 빨강 */
        .neko-ear::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 10px;
            background: #ff6b9d;
            border-radius: 50%;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 눈 */
        .neko-eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: 20px;
        }

        .neko-eye-left {
            left: 22px;
        }

        .neko-eye-right {
            right: 22px;
        }

        /* 입 */
        .neko-mouth {
            position: absolute;
            width: 20px;
            height: 12px;
            border: 2px solid #333;
            border-top: none;
            border-radius: 0 0 20px 20px;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 콧구멍 */
        .neko-nose {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #333;
            border-radius: 50%;
            top: 34px;
        }

        .neko-nose-left {
            left: 36px;
        }

        .neko-nose-right {
            right: 36px;
        }

        /* 팔 - 올려진 상태 */
        .neko-arm {
            position: absolute;
            width: 12px;
            height: 45px;
            background: white;
            border: 2px solid #333;
            border-radius: 10px;
            top: 35px;
        }

        .neko-arm-left {
            left: 10px;
            transform: rotate(-35deg);
            transform-origin: bottom center;
        }

        .neko-arm-right {
            right: 10px;
            transform: rotate(35deg);
            transform-origin: bottom center;
        }

        /* 다리 */
        .neko-leg {
            position: absolute;
            width: 12px;
            height: 20px;
            background: white;
            border: 2px solid #333;
            border-radius: 0 0 6px 6px;
            bottom: 8px;
        }

        .neko-leg-left {
            left: 35px;
        }

        .neko-leg-right {
            right: 35px;
        }

        /* 동전 */
        .neko-coin {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border: 2px solid #daa520;
            border-radius: 50%;
            bottom: 25px;
            right: 5px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 가챠 머신 - 옐로우 라운드 박스 스타일 */
        .gacha-machine {
            width: 320px;
            margin: 0 auto 40px;
            position: relative;
            background: transparent;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
        }

        /* 머신 상단 - 숨김 */
        .gacha-top {
            display: none;
        }

        .gacha-lights {
            display: none;
        }

        .light {
            display: none;
        }

        /* 가챠 머신 본체 - 라운드 박스들 */
        .gacha-body {
            width: 100%;
            height: auto;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            position: relative;
            gap: 10px;
        }

        /* 투명 윈도우 */
        .gacha-window {
            width: 280px;
            height: 200px;
            background: linear-gradient(135deg, #fffef5 0%, #fffbf0 100%);
            border: none;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 6px 18px rgba(255, 215, 0, 0.25);
        }

        /* 공들이 회전하는 영역 */
        .balls-container {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .balls-container.spinning {
            opacity: 1;
        }

        .ball {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), inset -1px -1px 2px rgba(255, 255, 255, 0.4);
        }

        .ball.red { background: linear-gradient(135deg, #ff6b6b, #ff4444); }
        .ball.blue { background: linear-gradient(135deg, #4dabf7, #1971c2); }
        .ball.purple { background: linear-gradient(135deg, #b197fc, #7950f2); }
        .ball.green { background: linear-gradient(135deg, #51cf66, #2f9e44); }
        .ball.orange { background: linear-gradient(135deg, #ffa94d, #ff922b); }
        .ball.pink { background: linear-gradient(135deg, #f783ac, #f06595); }

        @keyframes spin {
            from { transform: rotate(0deg) translateX(75px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(75px) rotate(-360deg); }
        }

        .balls-container.spinning .ball {
            animation: spin 0.3s linear infinite;
        }

        /* 결과 표시 */
        .result-box {
            position: absolute;
            text-align: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result-box.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-title {
            font-size: 2.4em;
            font-weight: 800;
            color: #d4a574;
            margin-bottom: 0;
            text-shadow: none;
            letter-spacing: 1px;
        }

        .result-lucky-item {
            font-size: 0.75em;
            color: #999;
            margin-bottom: 0;
            font-weight: 500;
            display: none;
        }

        .result-warning {
            font-size: 0.75em;
            color: #999;
            margin-top: 0;
            line-height: 1.3;
            padding: 0;
            display: none;
        }

        /* 출구 */
        .gacha-outlet {
            display: none;
        }

        .gacha-outlet::after {
            display: none;
        }

        /* 공이 튀어나오는 애니메이션 */
        .result-ball {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            opacity: 0;
            bottom: 50%;
        }

        .result-ball.pop {
            animation: ballPop 0.8s ease-out forwards;
        }

        @keyframes ballPop {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0.5);
            }
        }

        /* 버튼 영역 */
        .gacha-button-area {
            width: 100%;
            height: auto;
            background: transparent;
            border: none;
            border-top: none;
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none;
            padding: 0;
            margin-top: 5px;
        }

        .gacha-button {
            width: 150px;
            height: 55px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 700;
            color: #6b5b3c;
            text-shadow: none;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(255, 215, 0, 0.35);
        }

        .gacha-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.45);
        }

        .gacha-button:active:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(255, 215, 0, 0.35);
        }

        .gacha-button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* 상세 결과 */
        .detailed-result {
            display: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .detail-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #d4a574;
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .detail-content {
            color: #333;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .date-display {
            color: #6b5b3c;
            margin-top: 40px;
            font-size: 0.9em;
            background: white;
            padding: 12px 28px;
            border-radius: 15px;
            display: inline-block;
            border: none;
            box-shadow: 0 4px 12px rgba(107, 91, 60, 0.12);
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        /* 모달 팝업 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: #ffffff;
            border-radius: 25px;
            padding: 40px 35px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            color: #666;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: #333;
            transform: scale(1.1);
        }

        .modal-close:active {
            transform: scale(0.95);
        }

        .modal-title {
            font-size: 2.8em;
            font-weight: bold;
            color: #d4a574;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mascot">
            <div class="maneki-neko">
                <div class="neko-head">
                    <div class="neko-ear neko-ear-left"></div>
                    <div class="neko-ear neko-ear-right"></div>
                    <div class="neko-eye neko-eye-left"></div>
                    <div class="neko-eye neko-eye-right"></div>
                    <div class="neko-nose neko-nose-left"></div>
                    <div class="neko-nose neko-nose-right"></div>
                    <div class="neko-mouth"></div>
                </div>
                <div class="neko-body">
                    <div class="neko-arm neko-arm-left"></div>
                    <div class="neko-arm neko-arm-right"></div>
                    <div class="neko-leg neko-leg-left"></div>
                    <div class="neko-leg neko-leg-right"></div>
                </div>
                <div class="neko-coin"></div>
            </div>
        </div>
        <h1>오늘의 운세</h1>

        <div class="gacha-machine">
            <div class="gacha-lights">
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
            </div>

            <div class="gacha-top">
                <span>✨ 운세 뽑기 ✨</span>
            </div>

            <div class="gacha-body">
                <div class="gacha-window">
                    <div class="balls-container" id="ballsContainer">
                        <div class="ball red"></div>
                        <div class="ball blue"></div>
                        <div class="ball purple"></div>
                        <div class="ball green"></div>
                        <div class="ball orange"></div>
                        <div class="ball pink"></div>
                    </div>
                    <div class="result-box" id="resultBox">
                        <div class="result-title" id="resultTitle">-</div>
                        <div class="result-lucky-item" id="resultLuckyItem"></div>
                        <div class="result-warning" id="resultWarning"></div>
                    </div>
                    <div class="result-ball" id="resultBall"></div>
                </div>

                <div class="gacha-outlet"></div>
            </div>

            <div class="gacha-button-area">
                <button class="gacha-button" id="gacha-btn">뽑기</button>
            </div>
        </div>

        <div class="date-display" id="dateDisplay"></div>
    </div>

    <!-- 모달 팝업 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-title" id="modalTitle">-</div>
            <div id="modalIllustration" class="illustration"></div>

            <div class="detail-section">
                <div class="detail-label">📌 오늘의 운세</div>
                <div class="detail-content" id="detailToday"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">⚠️ 조심할 점</div>
                <div class="detail-content" id="detailWarning"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">💎 행운의 아이템</div>
                <div class="detail-content" id="detailLuckyItem"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">📅 오늘 하루 타이밍</div>
                <div class="detail-content" id="detailTiming"></div>
            </div>
        </div>
    </div>

    <script>
        const fortuneData = [
            {
                title: '대길',
                emoji: '✨',
                illustration: 'images/lucky.jpeg',
                today: '오늘은 모든 일이 뜻대로 흘러가는 최고의 길일이다!',
                warning: '자만하지 말고 감사하는 마음을 가지세요.',
                luckyItem: '흰색 옷, 수정, 동전',
                timing: '오전: 일 시작 · 점심: 중요한 결정 · 저녁: 경축'
            },
            {
                title: '소길',
                emoji: '🌸',
                illustration: 'images/happy.jpeg',
                today: '무난하고 편안한 하루가 될 것 같다. 작은 행운들이 쌓이는 날!',
                warning: '세심함을 잃지 마세요. 작은 실수가 누적될 수 있습니다.',

        const gachaBtn = document.getElementById('gacha-btn');
        const ballsContainer = document.getElementById('ballsContainer');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultBall = document.getElementById('resultBall');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalTitle = document.getElementById('modalTitle');
        const dateDisplay = document.getElementById('dateDisplay');

        // 오늘 날짜 표시
        function displayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const date = String(today.getDate()).padStart(2, '0');
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayName = dayNames[today.getDay()];
            dateDisplay.textContent = `${year}년 ${month}월 ${date}일 (${dayName}요일)`;
        }

        // 매번 랜덤 운세
        function getRandomFortune() {
            return fortuneData[Math.floor(Math.random() * fortuneData.length)];
        }

        // 모달 열기
        function openModal(fortune) {
            modalTitle.textContent = fortune.title;

            // 일러스트 렌더링 (이미지)
            const illustrationEl = document.getElementById('modalIllustration');
            illustrationEl.className = 'illustration';
            illustrationEl.innerHTML = `<img src="${fortune.illustration}" style="width: 120px; height: 140px; border-radius: 15px; object-fit: cover;">`;

            document.getElementById('detailToday').textContent = fortune.today;
            document.getElementById('detailWarning').textContent = fortune.warning;
            document.getElementById('detailLuckyItem').textContent = fortune.luckyItem;
            document.getElementById('detailTiming').textContent = fortune.timing;
            modalOverlay.classList.add('show');
        }

        // 모달 닫기
        function closeModal() {
            modalOverlay.classList.remove('show');
        }

        gachaBtn.addEventListener('click', () => {
            if (gachaBtn.disabled) return;

            gachaBtn.disabled = true;
            ballsContainer.classList.add('spinning');
            resultBox.classList.remove('show');

            // 공 튀어나오는 효과
            setTimeout(() => {
                resultBall.style.background = 'radial-gradient(135deg, #ff6b6b, #ff4444)';
                resultBall.classList.add('pop');
            }, 300);

            // 애니메이션 종료
            setTimeout(() => {
                ballsContainer.classList.remove('spinning');
                resultBall.classList.remove('pop');
                resultBall.style.background = '';

                const randomFortune = getRandomFortune();
                resultTitle.textContent = randomFortune.title;
                document.getElementById('resultLuckyItem').textContent = randomFortune.luckyItem;
                document.getElementById('resultWarning').textContent = randomFortune.warning;
                resultBox.classList.add('show');

                // 팝업 열기
                setTimeout(() => {
                    openModal(randomFortune);
                }, 300);

                gachaBtn.disabled = false;
            }, 1200);
        });

        // 모달 닫기 이벤트
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        displayDate();
    </script>
