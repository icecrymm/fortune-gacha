<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: url('images/fish.jpeg');
            background-size: 150px 150px;
            background-repeat: repeat;
            transform: rotate(45deg) translateZ(0);
            animation: moveBackground 30s linear infinite;
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
            will-change: transform;
            backface-visibility: hidden;
        }

        @keyframes moveBackground {
            0% {
                transform: rotate(45deg) translate(0, 0) translateZ(0);
            }
            100% {
                transform: rotate(45deg) translate(-150px, -150px) translateZ(0);
            }
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #6b5b3c;
            margin-bottom: 15px;
            font-size: 2em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 일러스트 기본 */
        .illustration {
            width: 100px;
            height: 120px;
            position: relative;
            margin: 15px auto 45px;
        }

        /* 공통 얼굴 구조 */
        .char-head {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #f4a692;
            border-radius: 50%;
            left: 10px;
            top: 10px;
        }

        .char-hair {
            position: absolute;
            width: 80px;
            height: 45px;
            background: #2c1810;
            border-radius: 50% 50% 0 0;
            left: 10px;
            top: 10px;
        }

        .char-ear {
            position: absolute;
            width: 18px;
            height: 22px;
            background: #f4a692;
            border-radius: 50%;
            top: 30px;
        }

        .char-ear-left { left: 2px; }
        .char-ear-right { right: 2px; }

        /* 표정 - 행운 (큰 웃음) */
        .illustration.lucky .char-eye {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 38px;
        }
        .illustration.lucky .char-eye-left { left: 32px; }
        .illustration.lucky .char-eye-right { right: 32px; }

        .illustration.lucky .char-eye::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: -2px;
            left: -3px;
            opacity: 0.3;
        }

        .illustration.lucky .char-mouth {
            position: absolute;
            width: 24px;
            height: 16px;
            border: 2px solid #d94970;
            border-top: none;
            border-radius: 0 0 24px 24px;
            left: 50%;
            top: 52px;
            transform: translateX(-50%);
        }

        /* 표정 - 평온 (눈 감음) */
        .illustration.peaceful .char-eye {
            width: 2px;
            height: 10px;
            background: #333;
            position: absolute;
            top: 35px;
            border-radius: 50%;
        }
        .illustration.peaceful .char-eye-left { left: 32px; }
        .illustration.peaceful .char-eye-right { right: 32px; }

        .illustration.peaceful .char-mouth {
            position: absolute;
            width: 20px;
            height: 10px;
            border: 2px solid #d94970;
            border-top: none;
            border-radius: 0 0 20px 20px;
            left: 50%;
            top: 54px;
            transform: translateX(-50%);
        }

        /* 표정 - 중립/깜짝 (O 입) */
        .illustration.neutral .char-eye {
            width: 7px;
            height: 9px;
            background: #333;
            position: absolute;
            top: 35px;
            border-radius: 50%;
        }
        .illustration.neutral .char-eye-left { left: 32px; }
        .illustration.neutral .char-eye-right { right: 32px; }

        .illustration.neutral .char-mouth {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #d94970;
            border-radius: 50%;
            left: 50%;
            top: 50px;
            transform: translateX(-50%);
        }

        /* 표정 - 화남 */
        .illustration.angry .char-eye {
            width: 6px;
            height: 6px;
            background: #333;
            position: absolute;
            top: 36px;
            border-radius: 50%;
        }
        .illustration.angry .char-eye-left { left: 32px; }
        .illustration.angry .char-eye-right { right: 32px; }

        .illustration.angry .char-eye::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 2px;
            background: #333;
            top: -3px;
            left: -2px;
            transform: rotate(-20deg);
        }

        .illustration.angry .char-mouth {
            position: absolute;
            width: 16px;
            height: 8px;
            border: 2px solid #d94970;
            border-radius: 0 0 16px 16px;
            left: 50%;
            top: 54px;
            transform: translateX(-50%);
        }

        /* 포즈 - 축하 (별, 팔) */
        .illustration.celebrating::before,
        .illustration.celebrating::after {
            content: '⭐';
            position: absolute;
            font-size: 16px;
            top: 15px;
        }
        .illustration.celebrating::before { left: -5px; }
        .illustration.celebrating::after { right: -5px; }

        .char-arm {
            position: absolute;
            width: 14px;
            height: 50px;
            background: #f4a692;
            border-radius: 10px;
            top: 70px;
        }
        .char-arm-left {
            left: 0;
            transform: rotate(-35deg);
            transform-origin: bottom center;
        }
        .char-arm-right {
            right: 0;
            transform: rotate(35deg);
            transform-origin: bottom center;
        }

        .illustration.celebrating .char-arm {
            transform: rotate(-50deg);
            transform-origin: bottom center;
            top: 60px;
        }
        .illustration.celebrating .char-arm-right {
            transform: rotate(50deg);
            transform-origin: bottom center;
        }

        /* 포즈 - 팔 올림 (승리) */
        .illustration.victorious .char-arm {
            width: 16px;
            height: 50px;
            top: 50px;
            transform: rotate(-60deg);
            transform-origin: bottom center;
        }
        .illustration.victorious .char-arm-right {
            transform: rotate(60deg);
            transform-origin: bottom center;
        }

        .mascot {
            width: 200px;
            height: 220px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
        }

        /* 마누키네코 일러스트 */
        .maneki-neko {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .maneki-neko img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 몸 */
        .neko-body {
            position: absolute;
            width: 70px;
            height: 80px;
            background: white;
            border: 3px solid #333;
            border-radius: 15px 15px 8px 8px;
            left: 25px;
            top: 30px;
            box-shadow: inset 0 0 0 2px #fff;
        }

        /* 머리 */
        .neko-head {
            position: absolute;
            width: 60px;
            height: 65px;
            background: white;
            border: 3px solid #333;
            border-radius: 50%;
            left: 30px;
            top: 0;
        }

        /* 귀 */
        .neko-ear {
            position: absolute;
            width: 14px;
            height: 20px;
            background: white;
            border: 2px solid #333;
            border-radius: 50% 50% 0 0;
            top: -5px;
        }

        .neko-ear-left {
            left: 15px;
        }

        .neko-ear-right {
            right: 15px;
        }

        /* 귀 안쪽 빨강 */
        .neko-ear::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 10px;
            background: #ff6b9d;
            border-radius: 50%;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 눈 */
        .neko-eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: 20px;
        }

        .neko-eye-left {
            left: 22px;
        }

        .neko-eye-right {
            right: 22px;
        }

        /* 입 */
        .neko-mouth {
            position: absolute;
            width: 20px;
            height: 12px;
            border: 2px solid #333;
            border-top: none;
            border-radius: 0 0 20px 20px;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 콧구멍 */
        .neko-nose {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #333;
            border-radius: 50%;
            top: 34px;
        }

        .neko-nose-left {
            left: 36px;
        }

        .neko-nose-right {
            right: 36px;
        }

        /* 팔 - 올려진 상태 */
        .neko-arm {
            position: absolute;
            width: 12px;
            height: 45px;
            background: white;
            border: 2px solid #333;
            border-radius: 10px;
            top: 35px;
        }

        .neko-arm-left {
            left: 10px;
            transform: rotate(-35deg);
            transform-origin: bottom center;
        }

        .neko-arm-right {
            right: 10px;
            transform: rotate(35deg);
            transform-origin: bottom center;
        }

        /* 다리 */
        .neko-leg {
            position: absolute;
            width: 12px;
            height: 20px;
            background: white;
            border: 2px solid #333;
            border-radius: 0 0 6px 6px;
            bottom: 8px;
        }

        .neko-leg-left {
            left: 35px;
        }

        .neko-leg-right {
            right: 35px;
        }

        /* 동전 */
        .neko-coin {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border: 2px solid #daa520;
            border-radius: 50%;
            bottom: 25px;
            right: 5px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 가챠 머신 - 옐로우 라운드 박스 스타일 */
        .gacha-machine {
            width: 320px;
            margin: 0 auto 40px;
            position: relative;
            background: transparent;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
        }

        /* 머신 상단 - 숨김 */
        .gacha-top {
            display: none;
        }

        .gacha-lights {
            display: none;
        }

        .light {
            display: none;
        }

        /* 가챠 머신 본체 - 라운드 박스들 */
        .gacha-body {
            width: 100%;
            height: auto;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            position: relative;
            gap: 20px;
        }

        /* 투명 윈도우 */
        .gacha-window {
            width: 280px;
            height: 200px;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe8cc 100%);
            border: 4px solid #d4a574;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 6px 18px rgba(255, 215, 0, 0.25), inset 0 0 0 2px #fff9e6;
        }

        /* 공들이 회전하는 영역 */
        .balls-container {
            position: absolute;
            width: 250px;
            height: 350px;
            opacity: 0;
            transition: opacity 0.3s;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            overflow: visible;
            pointer-events: none;
        }

        .balls-container.spinning {
            opacity: 1;
        }

        .ball {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), inset -1px -1px 2px rgba(255, 255, 255, 0.4);
        }

        .ball.red { background: linear-gradient(135deg, #ff6b6b, #ff4444); }
        .ball.blue { background: linear-gradient(135deg, #4dabf7, #1971c2); }
        .ball.purple { background: linear-gradient(135deg, #b197fc, #7950f2); }
        .ball.green { background: linear-gradient(135deg, #51cf66, #2f9e44); }
        .ball.orange { background: linear-gradient(135deg, #ffa94d, #ff922b); }
        .ball.pink { background: linear-gradient(135deg, #f783ac, #f06595); }

        @keyframes spin {
            from { transform: rotate(0deg) translateX(75px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(75px) rotate(-360deg); }
        }

        .balls-container.spinning .ball {
            animation: spin 0.3s linear infinite;
        }

        /* 결과 표시 */
        .result-box {
            position: absolute;
            text-align: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result-box.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-title {
            font-size: 2.4em;
            font-weight: 800;
            color: #d4a574;
            margin-bottom: 0;
            text-shadow: none;
            letter-spacing: 1px;
        }

        .result-lucky-item {
            font-size: 0.75em;
            color: #999;
            margin-bottom: 0;
            font-weight: 500;
            display: none;
        }

        .result-warning {
            font-size: 0.75em;
            color: #999;
            margin-top: 0;
            line-height: 1.3;
            padding: 0;
            display: none;
        }

        /* 출구 */
        .gacha-outlet {
            display: none;
        }

        .gacha-outlet::after {
            display: none;
        }

        /* 핀볼 공 스타일 */
        .result-ball {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            opacity: 0;
            top: 50%;
            left: 50%;
            margin-left: -14px;
            margin-top: -14px;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        .result-ball.pop {
            opacity: 1;
            will-change: transform, opacity;
        }

        /* 각 공의 애니메이션 - 박스 안에서 튀기기 */
        .result-ball:nth-child(1).pop { animation: bounce1 2s ease-in-out infinite; }
        .result-ball:nth-child(2).pop { animation: bounce2 2.3s ease-in-out infinite; }
        .result-ball:nth-child(3).pop { animation: bounce3 1.8s ease-in-out infinite; }
        .result-ball:nth-child(4).pop { animation: bounce4 2.5s ease-in-out infinite; }
        .result-ball:nth-child(5).pop { animation: bounce5 2.1s ease-in-out infinite; }
        .result-ball:nth-child(6).pop { animation: bounce6 1.9s ease-in-out infinite; }

        @keyframes bounce1 {
            0%, 100% { transform: translate(-50px, -100px); }
            25% { transform: translate(70px, 30px); }
            50% { transform: translate(20px, 100px); }
            75% { transform: translate(-100px, -30px); }
        }

        @keyframes bounce2 {
            0%, 100% { transform: translate(30px, -120px); }
            25% { transform: translate(-110px, 40px); }
            50% { transform: translate(50px, 80px); }
            75% { transform: translate(-40px, -50px); }
        }

        @keyframes bounce3 {
            0%, 100% { transform: translate(-90px, 20px); }
            25% { transform: translate(60px, -90px); }
            50% { transform: translate(10px, 70px); }
            75% { transform: translate(-110px, 10px); }
        }

        @keyframes bounce4 {
            0%, 100% { transform: translate(50px, -30px); }
            25% { transform: translate(-100px, -50px); }
            50% { transform: translate(40px, 60px); }
            75% { transform: translate(-50px, 20px); }
        }

        @keyframes bounce5 {
            0%, 100% { transform: translate(-110px, -40px); }
            25% { transform: translate(55px, 40px); }
            50% { transform: translate(-90px, 90px); }
            75% { transform: translate(30px, -60px); }
        }

        @keyframes bounce6 {
            0%, 100% { transform: translate(-40px, 40px); }
            25% { transform: translate(-110px, -30px); }
            50% { transform: translate(30px, -50px); }
            75% { transform: translate(50px, 70px); }
        }

        /* 버튼 영역 */
        .gacha-button-area {
            width: 100%;
            height: auto;
            background: transparent;
            border: none;
            border-top: none;
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none;
            padding: 0;
            margin-top: 25px;
        }

        .gacha-button {
            width: 150px;
            height: 55px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 3px solid #d4a574;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 700;
            color: #6b5b3c;
            text-shadow: none;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(255, 215, 0, 0.35);
        }

        .gacha-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.45);
        }

        .gacha-button:active:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(255, 215, 0, 0.35);
        }

        .gacha-button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* 상세 결과 */
        .detailed-result {
            display: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(30px);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .detail-section {
            margin-bottom: 15px;
            padding: 15px 18px;
            border-bottom: none;
            background: #fff9e6;
            border-radius: 15px;
            border: 2px solid #ffeab4;
        }

        .detail-section:last-child {
            margin-bottom: 15px;
            padding: 15px 18px;
            border-bottom: none;
            background: #fff9e6;
            border-radius: 15px;
            border: 2px solid #ffeab4;
        }

        .share-btn {
            width: 100%;
            padding: 12px 20px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 3px solid #d4a574;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            color: #6b5b3c;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.4);
        }

        .share-btn:active {
            transform: translateY(0);
        }

        .detail-label {
            font-weight: 600;
            color: #d4a574;
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .detail-content {
            color: #333;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .date-display {
            color: #6b5b3c;
            margin-top: 40px;
            font-size: 0.9em;
            background: white;
            padding: 12px 28px;
            border-radius: 15px;
            display: none;
            border: none;
            box-shadow: 0 4px 12px rgba(107, 91, 60, 0.12);
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        /* 모달 팝업 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            will-change: opacity;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: #ffffff;
            border-radius: 25px;
            padding: 40px 35px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 4px solid #d4a574;
            position: relative;
            animation: bounce 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            flex-direction: column;
            gap: 20px;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: #e8d4a8;
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #d4a574;
        }

        /* 떨어지는 이모지 */
        .falling-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            pointer-events: none;
            animation: burst 2s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            z-index: 500;
            --tx: 0px;
            --ty: 0px;
            font-size: 500px;
            line-height: 1;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(calc(-50% + 0px), calc(-50% + 0px)) scale(0.1);
            }
            40% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateZ(0);
            }
            to {
                opacity: 1;
                transform: scale(1) translateZ(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            color: #666;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: #333;
            transform: scale(1.1);
        }

        .modal-close:active {
            transform: scale(0.95);

        /* 모바일 성능 최적화 */

                animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);

        const gachaBtn = document.getElementById('gacha-btn');
        const ballsContainer = document.getElementById('ballsContainer');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultBall = document.getElementById('resultBall');
        const modalOverlay = document.getElementById('modalOverlay');

        const modalTitle = document.getElementById('modalTitle');
        const dateDisplay = document.getElementById('dateDisplay');

        // 오늘 날짜 표시
        function displayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const date = String(today.getDate()).padStart(2, '0');
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayName = dayNames[today.getDay()];
            dateDisplay.textContent = `${year}년 ${month}월 ${date}일 (${dayName}요일)`;
        }

        // 매번 랜덤 운세
        function getRandomFortune() {
            return fortuneData[Math.floor(Math.random() * fortuneData.length)];
        }

        // 모달 열기
        function openModal(fortune) {
            modalTitle.textContent = fortune.title;

            // 일러스트 렌더링 (이미지)
            const illustrationEl = document.getElementById('modalIllustration');
            illustrationEl.className = 'illustration';
            illustrationEl.innerHTML = `<img src="${fortune.illustration}" style="width: 120px; height: 140px; border-radius: 15px; object-fit: cover;">`;

            document.getElementById('detailToday').textContent = fortune.today;
            document.getElementById('detailWarning').textContent = fortune.warning;
            document.getElementById('detailLuckyItem').textContent = fortune.luckyItem;
            document.getElementById('detailTiming').textContent = fortune.timing;
            modalOverlay.classList.add('show');

            // 운세별 이모지 떨어지는 효과
            setTimeout(() => {
                let emojis = [];
                let count = 80;

                if (fortune.title === '대길' || fortune.title === '대대길') {
                    emojis = ['🍀', '⭐', '💎', '🎉'];
                    count = isMobile() ? 30 : 75;
                } else if (fortune.title === '소길' || fortune.title === '길') {
                    emojis = ['⭐', '💖', '✨', '🌟'];
                    count = isMobile() ? 25 : 60;
                } else if (fortune.title === '중길') {
                    emojis = ['🔥', '💪', '⭐', '✨'];
                    count = isMobile() ? 25 : 60;
                } else if (fortune.title === '평운') {
                    emojis = ['😊', '🌤️', '☁️', '😌'];
                    count = isMobile() ? 15 : 45;
                } else if (fortune.title === '소흉') {
                    emojis = ['⚠️', '😰', '⚡', '💧'];
                    count = isMobile() ? 20 : 50;
                } else if (fortune.title === '중흉') {
                    emojis = ['❓', '⚡', '🌪️', '💫'];
                    count = isMobile() ? 20 : 50;
                } else if (fortune.title === '흉') {
                    emojis = ['😢', '⚠️', '💔', '😞'];
                    count = isMobile() ? 20 : 50;
                } else if (fortune.title === '대흉') {
                    emojis = ['💀', '🔥', '⚡', '🖤'];
                    count = isMobile() ? 15 : 40;
                }

                // 이모지 폭발 효과 생성 - 동시다발적으로 펑!
                for (let emojiCount = 0; emojiCount < count; emojiCount++) {
                    const delay = isMobile() ? emojiCount * 5 : emojiCount * 2; // 모바일 5ms, 데스크톱 2ms
                    const timeoutId = setTimeout(() => {
                        const emoji = document.createElement('div');
                        emoji.className = 'falling-emoji';
                        emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];

                        // 완전히 랜덤한 각도로 흩어지기
                        const randomAngle = Math.random() * Math.PI * 2; // 0-360도 완전 랜덤
                        const finalAngle = randomAngle;

                        const distance = 250 + Math.random() * 300; // 250-550px 랜덤하게 흩어짐
                        const tx = Math.cos(finalAngle) * distance;
                        const ty = Math.sin(finalAngle) * distance;

                        emoji.style.setProperty('--tx', tx + 'px');
                        emoji.style.setProperty('--ty', ty + 'px');

                        modalOverlay.appendChild(emoji);
                    }, delay);

                    // setTimeout ID 추적
                    window.emojiTimeouts.push(timeoutId);
                }

                // 2.5초 후 이모지 제거
                setTimeout(() => {
                    // 진행 중인 모든 타임아웃 정리
                    window.emojiTimeouts.forEach(id => clearTimeout(id));
                    window.emojiTimeouts = [];

                    // 이모지 애니메이션 중지 및 제거
                    document.querySelectorAll('.falling-emoji').forEach(el => {
                        el.style.animation = 'none';
                        el.remove();
                    });
                }, 2500);
            }, 300);
        }

        // 모달 닫기
        function closeModal() {
            modalOverlay.classList.remove('show');

        // 공유하기 버튼 클릭 이벤트
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.addEventListener('click', function(e) {
            e.preventDefault();

            // 현재 보이는 운세 정보 수집
            const title = document.getElementById('modalTitle').textContent;
            const today = document.getElementById('detailToday').textContent;

            // 공유할 텍스트
            const shareText = `🎰 오늘의 운세: ${title}\n\n📌 ${today}\n\n운세 뽑기 앱에서 확인해보세요!`;

            // 웹 공유 API 지원 여부 확인
            if (navigator.share) {
                navigator.share({
                    title: '오늘의 운세',
                    text: shareText,
                    url: window.location.href
                }).catch(err => console.log('공유 취소'));
            } else {
                // 웹 공유 API 미지원 시 클립보드 복사
                const textArea = document.createElement('textarea');
                textArea.value = shareText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('운세가 클립보드에 복사되었어요! 💫');
            }
        });

        // AudioContext 한 번만 생성
        let audioContext = null;
        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // 뿅뿅 소리 함수 - 귀여운 게임기 소리
        function playPop() {
            try {
                const ctx = getAudioContext();

                // AudioContext가 suspended 상태면 resume
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }

                // 부드러운 저음 비프음
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.type = 'sine'; // 부드러운 sine 파형
                osc.frequency.value = 350; // 낮은 주파수

                gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log('Sound error:', e);
            }
        }

        gachaBtn.addEventListener('click', () => {
            if (gachaBtn.disabled) return;

            gachaBtn.disabled = true;
            ballsContainer.classList.add('spinning');
            resultBox.classList.remove('show');

            // 뿅 소리
            playPop();

            // 캡슐 공 색상
            const capsuleColors = [
                '#ff6b6b',
                '#4d94ff',
                '#ffd700',
                '#52d97a',
                '#b366ff',
                '#ff9f5a'
            ];

            // 파칭코 공 생성 및 애니메이션
            setTimeout(() => {
                capsuleColors.forEach((color, index) => {
                    const capsule = document.createElement('div');
                    capsule.className = 'result-ball';
                    capsule.style.background = color;
                    ballsContainer.appendChild(capsule);

                    // 약간의 지연 후 애니메이션 시작
                    setTimeout(() => {
                        capsule.classList.add('pop');
                    }, index * 50);
                });

                // 애니메이션 종료
                setTimeout(() => {
                    ballsContainer.classList.remove('spinning');
                    // 모든 캡슐 애니메이션 중지 및 제거
                    document.querySelectorAll('.result-ball').forEach(ball => {
                        ball.style.animation = 'none';
                        ball.remove();
                    });

                    const randomFortune = getRandomFortune();
                    resultTitle.textContent = randomFortune.title;
                    document.getElementById('resultLuckyItem').textContent = randomFortune.luckyItem;
                    document.getElementById('resultWarning').textContent = randomFortune.warning;
                    resultBox.classList.add('show');

                    // 팝업 열기
                    setTimeout(() => {
                        openModal(randomFortune);
                    }, 300);

                    gachaBtn.disabled = false;
                }, 1300);
            }, 300);
        });

        // 모달 닫기 이벤트
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        displayDate();
    </script>
